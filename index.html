/** ---------------------------------------------------------
 *  Runtime state
 *  - expanded: keyed by "slideIndex:key"
 *  - quiz: stores last try + attempts (repeatable)
 *  - order: stores current order + correctness
 *  --------------------------------------------------------- */
const stateKey = "processAutomationLecture2_full_v1";
let state = loadState() || {
  idx: 0,
  startedAt: new Date().toISOString(),
  expanded: {},
  quiz: {},
  order: {}
};

const $ = (sel) => document.querySelector(sel);
function saveState(){ localStorage.setItem(stateKey, JSON.stringify(state)); }
function loadState(){ try { return JSON.parse(localStorage.getItem(stateKey)); } catch { return null; } }
function resetState(){
  localStorage.removeItem(stateKey);
  state = { idx:0, startedAt:new Date().toISOString(), expanded:{}, quiz:{}, order:{} };
  render();
}

function expandKey(slideIdx, key){ return `${slideIdx}:${key}`; }

/** ---------------------------------------------------------
 *  Rendering
 *  --------------------------------------------------------- */
function render(){
  $("#courseTitle").textContent = lessonData.courseTitle;
  $("#courseSub").textContent = lessonData.courseSub;

  const goalsEl = $("#goals");
  goalsEl.innerHTML = "";
  for(const g of lessonData.learningOutcomes){
    const li = document.createElement("li");
    li.textContent = g;
    goalsEl.appendChild(li);
  }

  const slides = lessonData.slides;
  state.idx = Math.max(0, Math.min(state.idx, slides.length - 1));

  $("#slideCounter").textContent = `${state.idx + 1} / ${slides.length}`;
  $("#progressFill").style.width = `${((state.idx + 1) / slides.length) * 100}%`;

  $("#btnPrev").disabled = (state.idx === 0);
  $("#btnNext").disabled = (state.idx === slides.length - 1);

  const slide = slides[state.idx];
  const slideEl = $("#slide");
  slideEl.innerHTML = "";

  const h = document.createElement("h1");
  h.className = "h1";
  h.textContent = slide.title;
  slideEl.appendChild(h);

  if(slide.type === "content"){
    const content = document.createElement("div");
    content.innerHTML = slide.html;
    slideEl.appendChild(content);

    bindAllRevealsWithin(slideEl, state.idx);
    $("#statusLine").textContent = `Slide ${state.idx + 1}/${slides.length} • Use ← →`;
  }

  if(slide.type === "quiz"){
    renderQuiz(slideEl, slide, state.idx);
  }

  if(slide.type === "order"){
    renderOrder(slideEl, slide, state.idx);
  }

  saveState();
}

/** ---------------------------------------------------------
 *  Generic reveal binder (no hardcoded IDs)
 *  Requires: button[data-toggle="x"], icon span[data-icon="x"], panel div[data-panel="x"]
 *  State key: "slideIndex:x"
 *  --------------------------------------------------------- */
function bindAllRevealsWithin(root, slideIdx){
  const buttons = root.querySelectorAll("button[data-toggle]");
  buttons.forEach(btn => {
    const key = btn.getAttribute("data-toggle");
    const icon = root.querySelector(`[data-icon="${cssEscape(key)}"]`);
    const panel = root.querySelector(`[data-panel="${cssEscape(key)}"]`);
    if(!panel) return;

    const k = expandKey(slideIdx, key);
    const isOpen = !!state.expanded[k];
    panel.classList.toggle("hidden", !isOpen);
    if(icon) icon.textContent = isOpen ? "▾" : "▸";

    if(btn.dataset.bound === "1") return;
    btn.dataset.bound = "1";
    btn.addEventListener("click", () => {
      state.expanded[k] = !state.expanded[k];
      saveState();
      render();
    });
  });
}

// safe-ish CSS selector escape for simple keys
function cssEscape(str){
  return (str || "").replace(/"/g, '\\"');
}

/** ---------------------------------------------------------
 *  Quiz (repeatable; keeps last try + attempt history)
 *  state.quiz[slideIdx] = { lastSelectedIndex, lastCorrect, attempts:[{ts, selectedIndex, correct}] }
 *  --------------------------------------------------------- */
function renderQuiz(slideEl, slide, slideIdx){
  const p = document.createElement("p");
  p.className = "note";
  p.textContent = slide.prompt;
  slideEl.appendChild(p);

  const saved = state.quiz[slideIdx] || { attempts: [] };

  const form = document.createElement("div");
  slide.options.forEach((opt, i) => {
    const row = document.createElement("label");
    row.className = "quizOpt";

    const input = document.createElement("input");
    input.type = "radio";
    input.name = `quiz_${slideIdx}`;
    input.value = i;
    input.checked = (saved.lastSelectedIndex === i);

    const span = document.createElement("div");
    span.textContent = opt;

    row.appendChild(input);
    row.appendChild(span);
    form.appendChild(row);

    input.addEventListener("change", () => {
      const correct = (i === slide.answerIndex);
      const now = { ts: new Date().toISOString(), selectedIndex: i, correct };
      const nextSaved = state.quiz[slideIdx] || { attempts: [] };
      nextSaved.lastSelectedIndex = i;
      nextSaved.lastCorrect = correct;
      nextSaved.attempts = (nextSaved.attempts || []).concat([now]);
      state.quiz[slideIdx] = nextSaved;
      saveState();
      render();
    });
  });
  slideEl.appendChild(form);

  if(saved.lastSelectedIndex !== undefined){
    const fb = document.createElement("div");
    fb.className = "feedback " + (saved.lastCorrect ? "good" : "bad");
    fb.innerHTML = saved.lastCorrect
      ? `✅ Correct. ${slide.explanation}`
      : `❌ Not quite. ${slide.explanation}`;
    slideEl.appendChild(fb);

    const tries = (saved.attempts || []).length;
    $("#statusLine").textContent = `Quiz: ${saved.lastCorrect ? "correct ✅" : "try again ❌"} • Attempts: ${tries}`;
  } else {
    $("#statusLine").textContent = "Quiz: pick an answer (you can retry anytime).";
  }
}

/** ---------------------------------------------------------
 *  Order activity (drag-sort with pointer events)
 *  state.order[slideIdx] = { currentOrder:[...], correct:boolean, lastCheckedAt }
 *  --------------------------------------------------------- */
function renderOrder(slideEl, slide, slideIdx){
  const p = document.createElement("p");
  p.className = "note";
  p.textContent = slide.prompt;
  slideEl.appendChild(p);

  const saved = state.order[slideIdx];
  const current = saved?.currentOrder?.slice() || slide.items.slice();

  const list = document.createElement("div");
  current.forEach(text => {
    const item = document.createElement("div");
    item.className = "dragItem";
    item.textContent = text;
    list.appendChild(item);
  });

  enableDragSort(list);

  const btnRow = document.createElement("div");
  btnRow.className = "btns";

  const checkBtn = document.createElement("button");
  checkBtn.className = "good";
  checkBtn.textContent = "Check order";

  const resetBtn = document.createElement("button");
  resetBtn.textContent = "Reset";

  btnRow.appendChild(checkBtn);
  btnRow.appendChild(resetBtn);

  slideEl.appendChild(list);
  slideEl.appendChild(btnRow);

  const feedback = document.createElement("div");
  slideEl.appendChild(feedback);

  function getOrder(){ return [...list.querySelectorAll(".dragItem")].map(x => x.textContent); }

  checkBtn.addEventListener("click", () => {
    const now = getOrder();
    const correct = arraysEqual(now, slide.correctOrder);
    state.order[slideIdx] = { currentOrder: now, correct, lastCheckedAt: new Date().toISOString() };
    feedback.className = "feedback " + (correct ? "good" : "bad");
    feedback.innerHTML = correct
      ? `✅ Correct order. ${slide.explanation}`
      : `❌ Not yet. Hint: start with AS-IS, then TO-BE.`;
    $("#statusLine").textContent = correct ? "Activity: correct ✅" : "Activity: keep trying ❌";
    saveState();
  });

  resetBtn.addEventListener("click", () => {
    state.order[slideIdx] = { currentOrder: slide.items.slice(), correct: false, lastCheckedAt: new Date().toISOString() };
    saveState();
    render();
  });

  if(saved?.correct){
    feedback.className = "feedback good";
    feedback.innerHTML = `✅ Completed. ${slide.explanation}`;
    $("#statusLine").textContent = "Activity: completed ✅";
  } else {
    $("#statusLine").textContent = "Activity: drag items then check (repeatable).";
  }
}

function arraysEqual(a,b){
  if(!a || !b || a.length !== b.length) return false;
  for(let i=0;i<a.length;i++) if(a[i] !== b[i]) return false;
  return true;
}

/** ---------------------------------------------------------
 *  Drag-sort (Pointer Events) — mobile Chrome solution
 *  --------------------------------------------------------- */
function enableDragSort(container){
  if (container.dataset.dragSortBound === "1") return;
  container.dataset.dragSortBound = "1";

  let original = null;
  let ghost = null;
  let offsetY = 0;

  container.style.touchAction = "none";

  function listItems(){ return [...container.querySelectorAll(".dragItem")]; }

  function onPointerDown(e){
    const target = e.target.closest(".dragItem");
    if(!target) return;

    e.preventDefault();

    original = target;

    const rect = original.getBoundingClientRect();
    offsetY = e.clientY - rect.top;

    ghost = original.cloneNode(true);
    ghost.classList.add("dragGhost");
    ghost.style.left = rect.left + "px";
    ghost.style.top  = rect.top + "px";
    ghost.style.width = rect.width + "px";
    document.body.appendChild(ghost);

    original.style.visibility = "hidden";
    moveGhost(e.clientY);
  }

  function moveGhost(clientY){
    if(!ghost) return;
    ghost.style.top = (clientY - offsetY) + "px";

    const ghostRect = ghost.getBoundingClientRect();
    const ghostMidY = ghostRect.top + ghostRect.height / 2;

    let best = null;
    let bestDist = Infinity;

    for(const el of listItems()){
      if(el === original) continue;
      const r = el.getBoundingClientRect();
      const mid = r.top + r.height / 2;
      const d = Math.abs(mid - ghostMidY);
      if(d < bestDist){
        bestDist = d;
        best = { el, mid };
      }
    }

    if(best){
      const insertAfter = ghostMidY > best.mid;
      if(insertAfter){
        if(best.el.nextSibling !== original){
          container.insertBefore(original, best.el.nextSibling);
        }
      } else {
        if(best.el !== original.nextSibling){
          container.insertBefore(original, best.el);
        }
      }
    }
  }

  function cleanup(){
    if(!original) return;
    original.style.visibility = "";
    if(ghost){ ghost.remove(); ghost = null; }
    original = null;
  }

  function onPointerMove(e){
    if(!original || !ghost) return;
    e.preventDefault();
    moveGhost(e.clientY);
  }

  function onPointerUp(e){
    if(!original) return;
    e.preventDefault();
    cleanup();
  }

  container.addEventListener("pointerdown", onPointerDown);
  window.addEventListener("pointermove", onPointerMove, { passive:false });
  window.addEventListener("pointerup", onPointerUp, { passive:false });
  window.addEventListener("pointercancel", onPointerUp, { passive:false });
}

/** ---------------------------------------------------------
 *  Navigation + Actions
 *  --------------------------------------------------------- */
function nextSlide(){ if(state.idx < lessonData.slides.length - 1){ state.idx++; render(); } }
function prevSlide(){ if(state.idx > 0){ state.idx--; render(); } }

document.getElementById("btnNext").addEventListener("click", nextSlide);
document.getElementById("btnPrev").addEventListener("click", prevSlide);

document.getElementById("btnReset").addEventListener("click", resetState);

document.getElementById("btnExport").addEventListener("click", () => {
  const exportObj = {
    course: lessonData.courseTitle,
    startedAt: state.startedAt,
    exportedAt: new Date().toISOString(),
    currentSlide: state.idx + 1,
    expanded: state.expanded,
    // "last tries" are included as lastSelectedIndex/lastCorrect, plus attempts history for audit
    quiz: state.quiz,
    order: state.order,
    learningOutcomes: lessonData.learningOutcomes
  };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "lecture2_progress.json";
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById("statusLine").textContent = "Exported progress JSON.";
});

document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowRight") nextSlide();
  if(e.key === "ArrowLeft") prevSlide();
});

/** ---------------------------------------------------------
 *  Start
 *  --------------------------------------------------------- */
render();
</script>
</body>
</html>
