/** ---------------------------------------------------------
 *  Runtime state
 *  --------------------------------------------------------- */
const stateKey = "processAutomationLecture2_state_v1";
let state = loadState() || { idx:0, quiz:{}, startedAt:new Date().toISOString() };

const $ = (sel) => document.querySelector(sel);
function saveState(){ localStorage.setItem(stateKey, JSON.stringify(state)); }
function loadState(){ try { return JSON.parse(localStorage.getItem(stateKey)); } catch { return null; } }
function resetState(){
  localStorage.removeItem(stateKey);
  state = { idx:0, quiz:{}, startedAt:new Date().toISOString() };
  render();
}

/** ---------------------------------------------------------
 *  Rendering helpers
 *  --------------------------------------------------------- */
function el(tag, cls){
  const n = document.createElement(tag);
  if(cls) n.className = cls;
  return n;
}

function renderBlocks(parent, blocks){
  const container = el("div", "reading");

  for(const b of blocks){
    if(b.kind === "divider"){
      container.appendChild(el("div","divider"));
      continue;
    }

    if(b.kind === "p"){
      const p = el("p", b.cls || "");
      p.textContent = b.text;
      container.appendChild(p);
      continue;
    }

    if(b.kind === "ul"){
      const ul = document.createElement("ul");
      (b.items || []).forEach(t => {
        const li = document.createElement("li");
        li.textContent = t;
        ul.appendChild(li);
      });
      container.appendChild(ul);
      continue;
    }

    if(b.kind === "quote"){
      const q = el("div","quote");
      const main = el("div","");
      main.innerHTML = `<span class="qmark">“</span>${escapeHtml(b.text)}<span class="qmark">”</span>`;
      q.appendChild(main);

      if(b.attrib){
        const a = el("div","attrib");
        a.textContent = b.attrib;
        q.appendChild(a);
      }
      container.appendChild(q);
      continue;
    }

    if(b.kind === "reveal"){
      const wrap = el("div","reveal");
      const header = el("div","revealHeader");
      const left = el("div","");
      const t = el("div","revealTitle");
      t.textContent = b.title || "Details";
      const hint = el("div","revealHint");
      hint.textContent = b.hint || "click to expand";
      left.appendChild(t);
      left.appendChild(hint);

      const chev = el("div","chev");
      chev.textContent = "⌄";

      header.appendChild(left);
      header.appendChild(chev);

      const body = el("div","revealBody");
      renderBlocks(body, b.blocks || []);

      header.addEventListener("click", () => {
        wrap.classList.toggle("open");
      });

      wrap.appendChild(header);
      wrap.appendChild(body);
      container.appendChild(wrap);
      continue;
    }
  }

  parent.appendChild(container);
}

function escapeHtml(s){
  return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

/** ---------------------------------------------------------
 *  Main render
 *  --------------------------------------------------------- */
function render(){
  $("#courseTitle").textContent = lessonData.courseTitle;
  $("#courseSub").textContent = lessonData.courseSub;

  const goalsEl = $("#goals");
  goalsEl.innerHTML = "";
  for(const g of lessonData.learningGoals){
    const li = document.createElement("li");
    li.textContent = g;
    goalsEl.appendChild(li);
  }

  const slides = lessonData.slides;
  state.idx = Math.max(0, Math.min(state.idx, slides.length - 1));

  $("#slideCounter").textContent = `${state.idx + 1} / ${slides.length}`;
  $("#progressFill").style.width = `${((state.idx + 1) / slides.length) * 100}%`;

  $("#btnPrev").disabled = state.idx === 0;
  $("#btnNext").disabled = state.idx === slides.length - 1;

  const slide = slides[state.idx];
  const slideEl = $("#slide");
  slideEl.innerHTML = "";

  const h = el("h1","h1");
  h.textContent = slide.title;
  slideEl.appendChild(h);

  if(slide.type === "reading"){
    renderBlocks(slideEl, slide.blocks || []);
    $("#statusLine").textContent = "Reading: open sections to reveal details.";
  } else if(slide.type === "quiz"){
    renderQuiz(slideEl, slide);
  } else {
    const p = el("p","note");
    p.textContent = "Unknown slide type.";
    slideEl.appendChild(p);
  }

  saveState();
}

/** ---------------------------------------------------------
 *  Quiz renderer
 *  --------------------------------------------------------- */
function renderQuiz(slideEl, slide){
  const p = document.createElement("p");
  p.className = "note";
  p.textContent = slide.prompt;
  slideEl.appendChild(p);

  const saved = state.quiz[state.idx] || {};
  const form = document.createElement("div");

  slide.options.forEach((opt, i) => {
    const row = document.createElement("label");
    row.className = "quizOpt";

    const input = document.createElement("input");
    input.type = "radio";
    input.name = "quiz";
    input.value = i;
    input.checked = (saved.selectedIndex === i);

    const span = document.createElement("div");
    span.textContent = opt;

    row.appendChild(input);
    row.appendChild(span);
    form.appendChild(row);

    input.addEventListener("change", () => {
      state.quiz[state.idx] = { selectedIndex:i, correct:(i === slide.answerIndex) };
      render();
    });
  });

  slideEl.appendChild(form);

  if(saved.selectedIndex !== undefined){
    const fb = document.createElement("div");
    fb.className = "feedback " + (saved.correct ? "good" : "bad");
    fb.innerHTML = saved.correct ? `✅ Correct. ${escapeHtml(slide.explanation)}` : `❌ Not quite. ${escapeHtml(slide.explanation)}`;
    slideEl.appendChild(fb);
    $("#statusLine").textContent = saved.correct ? "Quiz: correct ✅" : "Quiz: try again ❌";
  } else {
    $("#statusLine").textContent = "Quiz: pick an answer.";
  }
}

/** ---------------------------------------------------------
 *  Navigation + Hotkeys
 *  --------------------------------------------------------- */
function next(){ if(state.idx < lessonData.slides.length - 1){ state.idx++; render(); } }
function prev(){ if(state.idx > 0){ state.idx--; render(); } }

$("#btnNext").addEventListener("click", next);
$("#btnPrev").addEventListener("click", prev);
$("#btnReset").addEventListener("click", resetState);

document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowRight") next();
  if(e.key === "ArrowLeft") prev();
});

/** ---------------------------------------------------------
 *  Start
 *  --------------------------------------------------------- */
render();
</script>
</body>
</html>
