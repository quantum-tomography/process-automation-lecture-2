/** ---------------------------------------------------------
 *  Render
 *  --------------------------------------------------------- */
function render(){
  document.getElementById("courseTitle").textContent = lessonData.courseTitle;
  document.getElementById("courseSub").textContent = lessonData.courseSub;

  const goalsEl = document.getElementById("goals");
  goalsEl.innerHTML = "";
  for(const g of lessonData.learningOutcomes){
    const li = document.createElement("li");
    li.textContent = g;
    goalsEl.appendChild(li);
  }

  const slides = lessonData.slides;
  state.idx = Math.max(0, Math.min(state.idx, slides.length - 1));

  document.getElementById("slideCounter").textContent = `${state.idx + 1} / ${slides.length}`;
  document.getElementById("progressFill").style.width = `${((state.idx + 1) / slides.length) * 100}%`;

  document.getElementById("btnPrev").disabled = (state.idx === 0);
  document.getElementById("btnNext").disabled = (state.idx === slides.length - 1);

  const slide = slides[state.idx];
  const slideEl = document.getElementById("slide");
  slideEl.innerHTML = "";

  const h = document.createElement("h1");
  h.className = "h1";
  h.textContent = slide.title;
  slideEl.appendChild(h);

  if(slide.type === "quiz"){
    slideEl.appendChild(renderQuiz(slide));
  } else {
    const content = document.createElement("div");
    content.innerHTML = slide.html;
    slideEl.appendChild(content);
    bindRevealsForSlide(state.idx);
  }

  const openCount = Object.values(state.expanded).filter(Boolean).length;
  const quizSlides = lessonData.slides.filter(s => s.type === "quiz").length;
  const quizAnswered = Object.keys(state.quiz || {}).length;
  document.getElementById("statusLine").textContent =
    `Slide ${state.idx + 1}/${slides.length} • Revealed blocks: ${openCount} • Quick checks (latest tries): ${quizAnswered}/${quizSlides}`;

  saveState();
}

function bindReveal(btnId, panelId, iconId, key){
  const btn = document.getElementById(btnId);
  const panel = document.getElementById(panelId);
  const icon = document.getElementById(iconId);
  if(!btn || !panel || !icon) return;

  const isOpen = !!state.expanded[key];
  panel.classList.toggle("hidden", !isOpen);
  icon.textContent = isOpen ? "▾" : "▸";

  btn.addEventListener("click", () => {
    state.expanded[key] = !state.expanded[key];
    saveState();
    render();
  });
}

/** ---------------------------------------------------------
 *  Retry-friendly quiz renderer:
 *  - ALWAYS clickable (no lock)
 *  - Store ONLY last selection per qid
 *  - Show feedback immediately
 *  --------------------------------------------------------- */
function renderQuiz(slide){
  const wrap = document.createElement("div");
  wrap.className = "book";

  const box = document.createElement("div");
  box.className = "quizBox";

  const goal = lessonData.learningOutcomes[slide.goalIndex] || "Learning goal";
  const t = document.createElement("div");
  t.className = "qTitle";
  t.textContent = `Quick Check • Goal: ${goal}`;
  box.appendChild(t);

  const p = document.createElement("p");
  p.className = "qPrompt";
  p.textContent = slide.question;
  box.appendChild(p);

  const opts = document.createElement("div");
  opts.className = "qOptions";

  const saved = state.quiz?.[slide.qid] || null;

  slide.options.forEach((txt, i) => {
    const b = document.createElement("button");
    b.className = "qOpt";
    b.type = "button";
    b.textContent = `${String.fromCharCode(65 + i)}. ${txt}`;

    if(saved){
      if(i === slide.correctIndex) b.classList.add("correct");
      if(i === saved.selectedIndex && !saved.isCorrect) b.classList.add("wrong");
    }

    b.addEventListener("click", () => {
      const isCorrect = (i === slide.correctIndex);
      state.quiz = state.quiz || {};
      state.quiz[slide.qid] = {
        selectedIndex: i,
        isCorrect,
        answeredAt: new Date().toISOString()
      };
      saveState();
      render();
    });

    opts.appendChild(b);
  });

  box.appendChild(opts);

  const fb = document.createElement("div");
  fb.className = "qFeedback";
  if(!saved){
    fb.innerHTML = `<strong>Pick one option.</strong> You can try as many times as you like; only your <em>latest</em> try is stored for export.`;
  } else {
    fb.innerHTML = saved.isCorrect
      ? `✅ <strong>Correct.</strong> ${slide.explanation}`
      : `❌ <strong>Not quite.</strong> ${slide.explanation}`;
  }
  box.appendChild(fb);

  const meta = document.createElement("div");
  meta.className = "qMeta";
  meta.textContent = saved
    ? `Last try: ${new Date(saved.answeredAt).toLocaleString()}`
    : "No attempts yet.";
  box.appendChild(meta);

  wrap.appendChild(box);
  return wrap;
}

// Navigation
function nextSlide(){ if(state.idx < lessonData.slides.length - 1){ state.idx++; render(); } }
function prevSlide(){ if(state.idx > 0){ state.idx--; render(); } }

document.getElementById("btnNext").addEventListener("click", nextSlide);
document.getElementById("btnPrev").addEventListener("click", prevSlide);

// Actions
document.getElementById("btnReset").addEventListener("click", resetState);
document.getElementById("btnExport").addEventListener("click", () => {
  const exportObj = {
    course: lessonData.courseTitle,
    startedAt: state.startedAt,
    currentSlide: state.idx + 1,
    expanded: state.expanded,
    quiz_last_tries: state.quiz,
    learningOutcomes: lessonData.learningOutcomes
  };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "lecture2_progress.json";
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById("statusLine").textContent = "Exported progress JSON (latest quiz tries).";
});

// Hotkeys
document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowRight") nextSlide();
  if(e.key === "ArrowLeft") prevSlide();
});

render();
