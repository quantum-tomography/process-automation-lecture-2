<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Process Automation – Lecture 2</title>

  <style>
    :root { --bg:#0b1220; --card:#111a2e; --text:#e7eefc; --muted:#a8b3cf; --accent:#4da3ff; --good:#3ddc97; --bad:#ff5c7a; }
    *{ box-sizing:border-box; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body{ margin:0; background:linear-gradient(160deg,#081022,#0b1220); color:var(--text); }
    header{ position:sticky; top:0; backdrop-filter: blur(10px); background:rgba(11,18,32,.7); border-bottom:1px solid rgba(255,255,255,.08); z-index:10; }
    .wrap{ max-width:1000px; margin:0 auto; padding:18px 18px; }
    .row{ display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .title{ font-weight:700; letter-spacing:.2px; }
    .sub{ color:var(--muted); font-size:14px; }
    .bar{ height:10px; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; }
    .bar > div{ height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#7cc6ff); transition:width .25s ease; }
    main{ padding:20px 0 60px; }
    .card{ background:rgba(17,26,46,.85); border:1px solid rgba(255,255,255,.08); border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
    .cardPad{ padding:18px; }

    .grid{ display:grid; grid-template-columns: 1fr; gap:14px; }
    @media(min-width: 900px){ .grid{ grid-template-columns: 2fr 1fr; } }

    .h1{ font-size:26px; margin:0 0 10px; }
    .h2{ font-size:18px; margin:18px 0 10px; color:#d8e6ff; }

    ul{ margin:10px 0 0 18px; color:var(--text); }
    li{ margin:6px 0; }

    .pill{ display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(77,163,255,.12); border:1px solid rgba(77,163,255,.35); color:#cfe7ff; font-size:12px; }

    .btns{ display:flex; gap:10px; flex-wrap:wrap; }
    button{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      transition:transform .04s ease, background .15s ease;
    }
    button:hover{ background:rgba(255,255,255,.10); }
    button:active{ transform:translateY(1px); }
    button.primary{ background:rgba(77,163,255,.20); border-color:rgba(77,163,255,.55); }
    button.primary:hover{ background:rgba(77,163,255,.28); }
    button.bad{ background:rgba(255,92,122,.16); border-color:rgba(255,92,122,.45); }

    .note{ color:var(--muted); font-size:14px; line-height:1.6; }
    .kbd{ font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; padding:2px 6px; border-radius:8px; border:1px solid rgba(255,255,255,.15); background:rgba(0,0,0,.18); }

    .footerNav{ position:fixed; bottom:0; left:0; right:0; background:rgba(11,18,32,.75); border-top:1px solid rgba(255,255,255,.08); backdrop-filter: blur(10px); }
    .footerNav .wrap{ display:flex; justify-content:space-between; align-items:center; gap:12px; }

    /* ---- Book-like typography ---- */
    .book{ max-width: 70ch; margin: 0; }
    .book p{ color: var(--text); line-height: 1.85; margin: 10px 0; font-size: 16px; }
    .book p.lead{ color: #d8e6ff; font-size: 16px; }
    .book .small{ color: var(--muted); font-size: 13px; margin-top: 6px; }
    .book hr{ border: none; border-top: 1px solid rgba(255,255,255,.10); margin: 18px 0; }
    .book .dropcap:first-letter{
      float:left; font-size: 42px; line-height: 38px; padding: 6px 8px 0 0;
      color: #d8e6ff; font-weight: 800;
    }

    .quote{
      margin:12px 0;
      padding:12px 14px;
      border-left:4px solid rgba(77,163,255,.75);
      background:rgba(77,163,255,.08);
      border-radius:14px;
      color:#d9ecff;
      white-space: pre-wrap;
    }

    /* Reveal blocks */
    .toggleBtn{
      display:flex; align-items:center; justify-content:space-between;
      width:100%; text-align:left; margin-top:14px; padding:10px 12px;
      border-radius:14px; border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04); cursor:pointer; color:#d8e6ff; font-weight:700;
    }
    .toggleBtn:hover{ background:rgba(255,255,255,.07); }
    .panel{
      margin-top:10px; padding:12px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.03);
    }
    .hidden{ display:none; }

    .kpiGrid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:10px; margin-top:10px; }
    .kpi{ border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.04); border-radius:14px; padding:12px; }
    .kpi strong{ display:block; font-size:13px; color:#d8e6ff; }
    .kpi span{ display:block; margin-top:6px; color:var(--text); }

    .marker{
      display:inline-block; padding:2px 8px; border-radius:999px;
      border:1px solid rgba(77,163,255,.35); background:rgba(77,163,255,.10);
      color:#cfe7ff; font-size:12px; transform: translateY(-1px);
    }
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="row">
      <div>
        <div class="title" id="courseTitle">Process Automation – Lecture 2</div>
        <div class="sub" id="courseSub">RPA Foundations</div>
      </div>
      <div class="pill">
        <span id="slideCounter">1 / 2</span>
        <span>•</span>
        <span>Keys:</span> <span class="kbd">←</span> <span class="kbd">→</span>
      </div>
    </div>
    <div style="margin-top:12px" class="bar"><div id="progressFill"></div></div>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="grid">
      <section class="card cardPad" id="slide"></section>

      <aside class="card cardPad">
        <div class="h2">Learning outcomes</div>
        <ul id="goals"></ul>

        <div class="h2">Quick actions</div>
        <div class="btns">
          <button id="btnExport" class="primary">Export progress JSON</button>
          <button id="btnReset" class="bad">Reset progress</button>
        </div>

        <div class="h2">How to use</div>
        <div class="note">
          Read the slides like short book pages.<br>
          Use <span class="marker">Reveal</span> buttons to unfold details.
        </div>
      </aside>
    </div>
  </div>
</main>

<div class="footerNav">
  <div class="wrap">
    <div class="btns">
      <button id="btnPrev">← Prev</button>
      <button id="btnNext" class="primary">Next →</button>
    </div>
    <div class="sub" id="statusLine"></div>
  </div>
</div>

<script>
/** ---------------------------------------------------------
 *  Two-slide lecture (book-like + reveal sections)
 *  Slide 2 updated with your new info (rewritten; quote kept verbatim)
 *  --------------------------------------------------------- */
const lessonData = {
  courseTitle: "Process Automation – Interactive Lecture 2",
  courseSub: "RPA Foundations",
  learningOutcomes: [
    "Explain what RPA is and what it can do",
    "Recognize why RPA gained strong market interest (investment, growth)",
    "Differentiate RPA (task automation) from BPA (end-to-end orchestration) at a high level",
    "Summarize why this matters for digital transformation"
  ],
  slides: [
    {
      type:"content",
      title:"RPA Foundations",
      html: `
        <div class="book">
          <p class="lead dropcap">
            Robotic Process Automation (RPA) has become one of the fastest-growing technologies in business automation.
            Instead of changing core systems, RPA typically works at the surface level: it follows rules and executes
            repetitive actions the same way a human user would—opening screens, copying data, clicking buttons, and
            submitting forms.
          </p>

          <p>
            This practical ability—automating work without rebuilding IT—helps explain why RPA attracted intense market
            interest. Investors and enterprise software vendors treated RPA not as a “nice-to-have” tool, but as a
            capability that could reduce operational friction across many industries.
          </p>

          <button class="toggleBtn" id="toggleInvest" type="button">
            <span>Reveal: Major investments in RPA</span>
            <span id="iconInvest">▸</span>
          </button>

          <div id="panelInvest" class="panel hidden">
            <p class="note" style="margin-top:0">
              In 2018, Automation Anywhere announced a major funding round:
            </p>
            <ul>
              <li><strong>$300 million</strong> investment by the SoftBank Vision Fund (2018)</li>
              <li>Total funding round exceeded <strong>$500 million</strong></li>
              <li>Strategic investor: <strong>Workday</strong>, a leading cloud-based ERP provider</li>
            </ul>

            <div class="quote">
“RPA is becoming a bigger focus for our customers, which is why it’s important for
us to partner closely with Automation Anywhere, a market leader.”
            </div>

            <p class="small">
              Interpretation: big rounds + strategic investors are a “market signal” that automation became a priority.
            </p>
          </div>

          <hr>

          <p>
            Funding alone does not prove a technology is useful in practice. But when it appears together with fast
            adoption and rapid scaling, it usually indicates that organizations repeatedly see value: time saved,
            fewer manual errors, and more consistent execution of routine work.
          </p>

          <button class="toggleBtn" id="toggleUiPath" type="button">
            <span>Reveal: Rapid growth of UiPath</span>
            <span id="iconUiPath">▸</span>
          </button>

          <div id="panelUiPath" class="panel hidden">
            <p class="note" style="margin-top:0">
              In April 2019, UiPath raised <strong>$568 million</strong> in a Series B funding round, backed by major global investors.
            </p>

            <div class="kpiGrid">
              <div class="kpi"><strong>Valuation</strong><span>$110 million → $7 billion</span></div>
              <div class="kpi"><strong>Annual recurring revenue</strong><span>$8 million → $200 million</span></div>
              <div class="kpi"><strong>Employees</strong><span>16× growth to 2,500 employees</span></div>
            </div>

            <p class="small">
              Interpretation: scaling this fast usually means many organizations were actively adopting the solution.
            </p>
          </div>

          <hr>

          <p>
            Why does this matter for process automation? Because RPA is rarely the final goal. It is often one tool in
            a larger strategy. If we automate a broken process, we simply make the broken behavior happen faster.
            That is why process thinking (AS-IS → TO-BE) is still essential.
          </p>

          <button class="toggleBtn" id="toggleWhy" type="button">
            <span>Reveal: Why this matters (3 key points)</span>
            <span id="iconWhy">▸</span>
          </button>

          <div id="panelWhy" class="panel hidden">
            <ul>
              <li>RPA is viewed as a transformative enterprise technology.</li>
              <li>Large corporations treat automation as a strategic capability.</li>
              <li>Demand for end-to-end process automation continues to grow rapidly.</li>
            </ul>
          </div>
        </div>
      `
    },

    /* ---------------------- SLIDE 2 UPDATED ---------------------- */
    {
      type:"content",
      title:"Signals of adoption and momentum",
      html: `
        <div class="book">
          <p class="lead dropcap">
            Another reason the RPA market felt “hot” was the clear sign of momentum inside the leading platforms.
            UiPath, for example, continued to push frequent platform updates while expanding its enterprise offering.
            At the same time, it began collecting a list of high-visibility customers—exactly the kind of adoption that
            convinces other organizations that a technology is becoming mainstream.
          </p>

          <button class="toggleBtn" id="toggleMomentum" type="button">
            <span>Reveal: Product releases and enterprise customers</span>
            <span id="iconMomentum">▸</span>
          </button>

          <div id="panelMomentum" class="panel hidden">
            <ul>
              <li>UiPath launched <strong>six new releases</strong> of its Enterprise RPA platform.</li>
              <li>It also attracted large, well-known customers such as <strong>McDonald’s</strong>, <strong>Duracell</strong>, <strong>Google</strong>,
                  <strong>Nippon Life Insurance</strong>, <strong>Ricoh</strong>, and <strong>Voya Financial</strong>.</li>
            </ul>
            <p class="small">
              In a lecture context: frequent releases signal product maturity; well-known customers signal trust and scalable value.
            </p>
          </div>

          <hr>

          <p>
            Leaders in the industry framed this moment as a workforce shift: software robots handling routine work,
            enabling people to focus on more impactful tasks. They also connected RPA to a broader roadmap—where RPA,
            AI, and other emerging technologies reinforce each other inside a single automation platform.
          </p>

          <button class="toggleBtn" id="toggleDines" type="button">
            <span>Reveal: UiPath CEO Daniel Dines (quote)</span>
            <span id="iconDines">▸</span>
          </button>

          <div id="panelDines" class="panel hidden">
            <div class="quote">
“We are
at the tipping point. Business leaders everywhere are augmenting
their workforces with software robots, rapidly accelerating the digital
transformation of their entire business and freeing employees to spend
time on more impactful work. UiPath is leading this workforce revolution,
driven by our core determination to democratize RPA and deliver on our
vision of a robot helping every person. I am humbled by the amazing
support our customers, partners and investors give us every day, inspiring
us to work harder to evolve RPA as the platform that not only unlocks the
true potential of AI, but also other emerging technologies. We are just
getting started.”
            </div>
          </div>

          <hr>

          <p>
            So why all the interest—especially if demand shows few signs of slowing? The short answer is that RPA sits
            at the intersection of three very practical needs: reducing routine manual work, dealing with fragmented
            systems, and improving speed without waiting for long IT modernization projects.
          </p>

          <button class="toggleBtn" id="toggleDrivers" type="button">
            <span>Reveal: Key drivers behind RPA interest</span>
            <span id="iconDrivers">▸</span>
          </button>

          <div id="panelDrivers" class="panel hidden">
            <ul>
              <li><strong>Efficiency pressure:</strong> high-volume routine work is expensive when done manually.</li>
              <li><strong>Legacy reality:</strong> many systems don’t integrate cleanly; RPA can bridge gaps.</li>
              <li><strong>Speed to value:</strong> automation can be deployed faster than rebuilding core systems.</li>
              <li><strong>Work redesign:</strong> shifting repetitive work to bots can improve consistency and free human attention.</li>
            </ul>
          </div>

          <hr>

          <p>
            In the next parts of the lecture, we’ll turn these big claims into clear definitions.
            What exactly is RPA? Where does it fit inside business process automation? And what are the core elements
            (people, process, governance, monitoring) that decide whether an RPA initiative succeeds?
          </p>

          <button class="toggleBtn" id="toggleNext" type="button">
            <span>Reveal: What this lecture will build next</span>
            <span id="iconNext">▸</span>
          </button>

          <div id="panelNext" class="panel hidden">
            <ul>
              <li>A precise definition of RPA (task scope, rule-based behavior, typical architecture)</li>
              <li>Common use cases and “anti-use cases” (where it helps most vs. where it fails)</li>
              <li>Core elements: selection, governance, exceptions, monitoring, continuous improvement</li>
            </ul>
            <p class="small">We can add these as new slides when you’re ready.</p>
          </div>
        </div>
      `
    }
  ]
};

const stateKey = "processAutomationLecture2_book_v3";
let state = loadState() || {
  idx:0,
  startedAt:new Date().toISOString(),
  expanded: {
    // slide 1
    invest:false, uipath:false, why:false,
    // slide 2
    momentum:false, dines:false, drivers:false, next:false
  }
};

const $ = (sel) => document.querySelector(sel);
function saveState(){ localStorage.setItem(stateKey, JSON.stringify(state)); }
function loadState(){ try { return JSON.parse(localStorage.getItem(stateKey)); } catch { return null; } }
function resetState(){
  localStorage.removeItem(stateKey);
  state = {
    idx:0,
    startedAt:new Date().toISOString(),
    expanded: { invest:false, uipath:false, why:false, momentum:false, dines:false, drivers:false, next:false }
  };
  render();
}

function render(){
  $("#courseTitle").textContent = lessonData.courseTitle;
  $("#courseSub").textContent = lessonData.courseSub;

  const goalsEl = $("#goals");
  goalsEl.innerHTML = "";
  for(const g of lessonData.learningOutcomes){
    const li = document.createElement("li");
    li.textContent = g;
    goalsEl.appendChild(li);
  }

  const slides = lessonData.slides;
  state.idx = Math.max(0, Math.min(state.idx, slides.length - 1));

  $("#slideCounter").textContent = `${state.idx + 1} / ${slides.length}`;
  $("#progressFill").style.width = `${((state.idx + 1) / slides.length) * 100}%`;

  $("#btnPrev").disabled = (state.idx === 0);
  $("#btnNext").disabled = (state.idx === slides.length - 1);

  const slide = slides[state.idx];
  const slideEl = $("#slide");
  slideEl.innerHTML = "";

  const h = document.createElement("h1");
  h.className = "h1";
  h.textContent = slide.title;
  slideEl.appendChild(h);

  const content = document.createElement("div");
  content.innerHTML = slide.html;
  slideEl.appendChild(content);

  // Bind reveals based on current slide
  if(state.idx === 0){
    bindReveal("toggleInvest", "panelInvest", "iconInvest", "invest");
    bindReveal("toggleUiPath", "panelUiPath", "iconUiPath", "uipath");
    bindReveal("toggleWhy", "panelWhy", "iconWhy", "why");
  } else if(state.idx === 1){
    bindReveal("toggleMomentum", "panelMomentum", "iconMomentum", "momentum");
    bindReveal("toggleDines", "panelDines", "iconDines", "dines");
    bindReveal("toggleDrivers", "panelDrivers", "iconDrivers", "drivers");
    bindReveal("toggleNext", "panelNext", "iconNext", "next");
  }

  const openCount = Object.values(state.expanded).filter(Boolean).length;
  $("#statusLine").textContent = `Slide ${state.idx + 1}/${slides.length} • Revealed blocks total: ${openCount}`;

  saveState();
}

function bindReveal(btnId, panelId, iconId, key){
  const btn = document.getElementById(btnId);
  const panel = document.getElementById(panelId);
  const icon = document.getElementById(iconId);
  if(!btn || !panel || !icon) return;

  const isOpen = !!state.expanded[key];
  panel.classList.toggle("hidden", !isOpen);
  icon.textContent = isOpen ? "▾" : "▸";

  btn.addEventListener("click", () => {
    state.expanded[key] = !state.expanded[key];
    saveState();
    render();
  });
}

// Navigation
function nextSlide(){ if(state.idx < lessonData.slides.length - 1){ state.idx++; render(); } }
function prevSlide(){ if(state.idx > 0){ state.idx--; render(); } }

document.getElementById("btnNext").addEventListener("click", nextSlide);
document.getElementById("btnPrev").addEventListener("click", prevSlide);

// Actions
document.getElementById("btnReset").addEventListener("click", resetState);
document.getElementById("btnExport").addEventListener("click", () => {
  const exportObj = {
    course: lessonData.courseTitle,
    startedAt: state.startedAt,
    currentSlide: state.idx + 1,
    expanded: state.expanded,
    learningOutcomes: lessonData.learningOutcomes
  };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "lecture2_progress.json";
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById("statusLine").textContent = "Exported progress JSON.";
});

// Hotkeys
document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowRight") nextSlide();
  if(e.key === "ArrowLeft") prevSlide();
});

render();
</script>
</body>
</html>
