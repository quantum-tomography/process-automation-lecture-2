/** ---------------------------------------------------------
 *  State (retry quizzes: keep ONLY last attempt per qid)
 *  --------------------------------------------------------- */
const stateKey = "processAutomationLecture2_book_retryQuiz_v1";
let state = loadState() || {
  idx:0,
  startedAt:new Date().toISOString(),
  expanded: {
    // slide 1
    invest:false, uipath:false, why:false,
    // slide 2
    momentum:false, dines:false, drivers:false, next:false,
    // new slides
    tasks:false, vendorView:false, notMacro:false, flavors:false,
    benefits:false, downsides:false, compare:false
  },
  quiz: {
    // qid: { selectedIndex, isCorrect, answeredAt }
  }
};

const $ = (sel) => document.querySelector(sel);
function saveState(){ localStorage.setItem(stateKey, JSON.stringify(state)); }
function loadState(){ try { return JSON.parse(localStorage.getItem(stateKey)); } catch { return null; } }
function resetState(){
  localStorage.removeItem(stateKey);
  state = {
    idx:0,
    startedAt:new Date().toISOString(),
    expanded: {
      invest:false, uipath:false, why:false,
      momentum:false, dines:false, drivers:false, next:false,
      tasks:false, vendorView:false, notMacro:false, flavors:false,
      benefits:false, downsides:false, compare:false
    },
    quiz:{}
  };
  render();
}

/** ---------------------------------------------------------
 *  Render
 *  --------------------------------------------------------- */
function render(){
  $("#courseTitle").textContent = lessonData.courseTitle;
  $("#courseSub").textContent = lessonData.courseSub;

  const goalsEl = $("#goals");
  goalsEl.innerHTML = "";
  for(const g of lessonData.learningOutcomes){
    const li = document.createElement("li");
    li.textContent = g;
    goalsEl.appendChild(li);
  }

  const slides = lessonData.slides;
  state.idx = Math.max(0, Math.min(state.idx, slides.length - 1));

  $("#slideCounter").textContent = `${state.idx + 1} / ${slides.length}`;
  $("#progressFill").style.width = `${((state.idx + 1) / slides.length) * 100}%`;

  $("#btnPrev").disabled = (state.idx === 0);
  $("#btnNext").disabled = (state.idx === slides.length - 1);

  const slide = slides[state.idx];
  const slideEl = $("#slide");
  slideEl.innerHTML = "";

  const h = document.createElement("h1");
  h.className = "h1";
  h.textContent = slide.title;
  slideEl.appendChild(h);

  if(slide.type === "quiz"){
    slideEl.appendChild(renderQuiz(slide));
  } else {
    const content = document.createElement("div");
    content.innerHTML = slide.html;
    slideEl.appendChild(content);
    bindRevealsForSlide(state.idx);
  }

  const openCount = Object.values(state.expanded).filter(Boolean).length;
  const quizAnswered = Object.keys(state.quiz || {}).length;
  $("#statusLine").textContent = `Slide ${state.idx + 1}/${slides.length} • Revealed blocks: ${openCount} • Quick checks (latest tries): ${quizAnswered}/4`;

  saveState();
}

function bindRevealsForSlide(idx){
  if(idx === 0){
    bindReveal("toggleInvest", "panelInvest", "iconInvest", "invest");
    bindReveal("toggleUiPath", "panelUiPath", "iconUiPath", "uipath");
    bindReveal("toggleWhy", "panelWhy", "iconWhy", "why");
  } else if(idx === 1){
    bindReveal("toggleMomentum", "panelMomentum", "iconMomentum", "momentum");
    bindReveal("toggleDines", "panelDines", "iconDines", "dines");
    bindReveal("toggleDrivers", "panelDrivers", "iconDrivers", "drivers");
    bindReveal("toggleNext", "panelNext", "iconNext", "next");
  } else if(idx === 2){
    bindReveal("toggleTasks", "panelTasks", "iconTasks", "tasks");
  } else if(idx === 3){
    bindReveal("toggleVendorView", "panelVendorView", "iconVendorView", "vendorView");
  } else if(idx === 4){
    bindReveal("toggleNotMacro", "panelNotMacro", "iconNotMacro", "notMacro");
  } else if(idx === 5){
    bindReveal("toggleFlavors", "panelFlavors", "iconFlavors", "flavors");
  } else if(idx === 6){
    bindReveal("toggleBenefits", "panelBenefits", "iconBenefits", "benefits");
    bindReveal("toggleDownsides", "panelDownsides", "iconDownsides", "downsides");
  } else if(idx === 7){
    bindReveal("toggleCompare", "panelCompare", "iconCompare", "compare");
  }
}

function bindReveal(btnId, panelId, iconId, key){
  const btn = document.getElementById(btnId);
  const panel = document.getElementById(panelId);
  const icon = document.getElementById(iconId);
  if(!btn || !panel || !icon) return;

  const isOpen = !!state.expanded[key];
  panel.classList.toggle("hidden", !isOpen);
  icon.textContent = isOpen ? "▾" : "▸";

  btn.addEventListener("click", () => {
    state.expanded[key] = !state.expanded[key];
    saveState();
    render();
  });
}

/** ---------------------------------------------------------
 *  Retry-friendly quiz renderer:
 *  - ALWAYS clickable (no lock)
 *  - Store ONLY last selection per qid
 *  - Show feedback immediately
 *  --------------------------------------------------------- */
function renderQuiz(slide){
  const wrap = document.createElement("div");
  wrap.className = "book";

  const box = document.createElement("div");
  box.className = "quizBox";

  const goal = lessonData.learningOutcomes[slide.goalIndex] || "Learning goal";
  const t = document.createElement("div");
  t.className = "qTitle";
  t.textContent = `Quick Check • Goal: ${goal}`;
  box.appendChild(t);

  const p = document.createElement("p");
  p.className = "qPrompt";
  p.textContent = slide.question;
  box.appendChild(p);

  const opts = document.createElement("div");
  opts.className = "qOptions";

  const saved = state.quiz?.[slide.qid] || null;

  slide.options.forEach((txt, i) => {
    const b = document.createElement("button");
    b.className = "qOpt";
    b.type = "button";
    b.textContent = `${String.fromCharCode(65 + i)}. ${txt}`;

    // highlight based on LAST attempt
    if(saved){
      if(i === slide.correctIndex) b.classList.add("correct");
      if(i === saved.selectedIndex && !saved.isCorrect) b.classList.add("wrong");
    }

    b.addEventListener("click", () => {
      const isCorrect = (i === slide.correctIndex);
      state.quiz = state.quiz || {};
      state.quiz[slide.qid] = {
        selectedIndex: i,
        isCorrect,
        answeredAt: new Date().toISOString()
      };
      saveState();
      render(); // rerender to update highlights + feedback
    });

    opts.appendChild(b);
  });

  box.appendChild(opts);

  const fb = document.createElement("div");
  fb.className = "qFeedback";
  if(!saved){
    fb.innerHTML = `<strong>Pick one option.</strong> You can try as many times as you like; only your <em>latest</em> try is stored for export.`;
  } else {
    fb.innerHTML = saved.isCorrect
      ? `✅ <strong>Correct.</strong> ${slide.explanation}`
      : `❌ <strong>Not quite.</strong> ${slide.explanation}`;
  }
  box.appendChild(fb);

  const meta = document.createElement("div");
  meta.className = "qMeta";
  meta.textContent = saved
    ? `Last try: ${new Date(saved.answeredAt).toLocaleString()}`
    : "No attempts yet.";
  box.appendChild(meta);

  wrap.appendChild(box);
  return wrap;
}

// Navigation
function nextSlide(){ if(state.idx < lessonData.slides.length - 1){ state.idx++; render(); } }
function prevSlide(){ if(state.idx > 0){ state.idx--; render(); } }

document.getElementById("btnNext").addEventListener("click", nextSlide);
document.getElementById("btnPrev").addEventListener("click", prevSlide);

// Actions
document.getElementById("btnReset").addEventListener("click", resetState);
document.getElementById("btnExport").addEventListener("click", () => {
  const exportObj = {
    course: lessonData.courseTitle,
    startedAt: state.startedAt,
    currentSlide: state.idx + 1,
    expanded: state.expanded,
    quiz_last_tries: state.quiz,   // only last tries (qid -> last attempt)
    learningOutcomes: lessonData.learningOutcomes
  };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "lecture2_progress.json";
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById("statusLine").textContent = "Exported progress JSON (latest quiz tries).";
});

// Hotkeys
document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowRight") nextSlide();
  if(e.key === "ArrowLeft") prevSlide();
});

render();
</script>
